<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Movie Watchlist</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 16px;
    color: #1a1a1a;
    background: #f5f5f5;
    padding: 1rem;
  }
  .container { max-width: 600px; margin: 0 auto; }
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  h1 { font-size: 1.2rem; font-weight: 700; }
  .header-right { text-align: right; flex-shrink: 0; }
  .updated { font-size: 0.75rem; color: #888; }
  .refresh {
    display: inline-block;
    margin-top: 0.2rem;
    font-size: 0.8rem;
    color: #0066cc;
    text-decoration: none;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }
  th {
    text-align: left;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: #888;
    background: #f0f0f0;
    padding: .5rem .75rem;
  }
  td {
    padding: .6rem .75rem;
    border-top: 1px solid #f0f0f0;
    vertical-align: middle;
  }
  .movie-title { font-size: 0.9rem; font-weight: 500; }
  .providers {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: flex-start;
  }
  .provider {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .provider img {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    display: block;
  }
  .provider-note {
    font-size: 0.58rem;
    color: #888;
    text-align: center;
    line-height: 1.2;
    max-width: 44px;
    word-break: break-word;
  }
  .none { color: #ccc; font-size: 0.85rem; }
  footer {
    margin-top: .75rem;
    font-size: .7rem;
    color: #bbb;
    text-align: center;
  }
  footer a { color: #bbb; }
</style>
</head>
