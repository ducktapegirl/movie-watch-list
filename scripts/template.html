<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Movie Watchlist</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 16px;
    color: #1a1a1a;
    background: #f5f5f5;
    padding: 1rem;
  }
  .container { max-width: 600px; margin: 0 auto; }
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  h1 { font-size: 1.2rem; font-weight: 700; }
  .header-right { text-align: right; flex-shrink: 0; }
  .updated { font-size: 0.75rem; color: #888; }
  .refresh {
    display: inline-block;
    margin-top: 0.2rem;
    font-size: 0.8rem;
    color: #0066cc;
    text-decoration: none;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    font-family: inherit;
  }
  .refresh:disabled { color: #aaa; cursor: default; }
  .refresh-status {
    display: block;
    font-size: 0.7rem;
    color: #888;
    margin-top: 0.2rem;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }
  th {
    text-align: left;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: #888;
    background: #f0f0f0;
    padding: .5rem .75rem;
  }
  td {
    padding: .6rem .75rem;
    border-top: 1px solid #f0f0f0;
    vertical-align: middle;
  }
  .movie-title { font-size: 0.9rem; font-weight: 500; }
  .providers {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: flex-start;
  }
  .provider {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .provider img {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    display: block;
  }
  .provider-note {
    font-size: 0.58rem;
    color: #888;
    text-align: center;
    line-height: 1.2;
    max-width: 44px;
    word-break: break-word;
  }
  .none { color: #ccc; font-size: 0.85rem; }
  footer {
    margin-top: .75rem;
    font-size: .7rem;
    color: #bbb;
    text-align: center;
  }
  footer a { color: #bbb; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Movie Watchlist</h1>
    <div class="header-right">
      <div class="updated">Updated {{ updated_at }}</div>
      <button id="refresh-btn" class="refresh" type="button">↻ Refresh</button>
      <span id="refresh-status" class="refresh-status"></span>
    </div>
  </header>
  <table>
    <thead>
      <tr><th>Movie</th><th>Streaming</th></tr>
    </thead>
    <tbody>
      {% for movie in movies %}
      <tr>
        <td class="movie-title">{{ movie.title }}</td>
        <td>
          {% if movie.providers %}
          <div class="providers">
            {% for p in movie.providers %}
            <div class="provider">
              <img src="{{ p.logo }}" alt="{{ p.name }}" title="{{ p.name }}">
              {% if p.note %}<span class="provider-note">({{ p.note }})</span>{% endif %}
            </div>
            {% endfor %}
          </div>
          {% else %}
          <span class="none">—</span>
          {% endif %}
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  <footer>Streaming data provided by <a href="https://www.justwatch.com" target="_blank" rel="noopener">JustWatch</a> via <a href="https://www.themoviedb.org" target="_blank" rel="noopener">TMDB</a></footer>
</div>
<script>
  // Fine-grained PAT scoped to this repo only, with "Actions: Read and write"
  // permission and nothing else. Generate at https://github.com/settings/personal-access-tokens
  // Never hardcoded here - GitHub's push protection blocks committing real
  // tokens anyway. Instead it's entered once and kept in this browser's
  // localStorage, so it's never written to the page source or git history.
  const REPO = "ducktapegirl/movie-watch-list";
  const WORKFLOW = "refresh.yml";
  const TOKEN_KEY = "movie-watch-list-gh-token";

  function getToken() {
    let token = localStorage.getItem(TOKEN_KEY);
    if (!token) {
      token = window.prompt(
        "Enter your GitHub fine-grained PAT (Actions: read/write, scoped to this repo):"
      );
      if (token) localStorage.setItem(TOKEN_KEY, token);
    }
    return token;
  }

  document.getElementById("refresh-btn").addEventListener("click", async () => {
    const btn = document.getElementById("refresh-btn");
    const status = document.getElementById("refresh-status");
    const token = getToken();
    if (!token) return;
    btn.disabled = true;
    status.textContent = "Starting refresh…";
    try {
      const res = await fetch(
        `https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/dispatches`,
        {
          method: "POST",
          headers: {
            Authorization: `Bearer ${token}`,
            Accept: "application/vnd.github+json",
          },
          body: JSON.stringify({ ref: "main" }),
        }
      );
      if (res.status === 204) {
        status.textContent = "Refreshing… reloading in 60s";
        setTimeout(() => location.reload(), 60000);
      } else {
        if (res.status === 401 || res.status === 403) {
          localStorage.removeItem(TOKEN_KEY);
        }
        status.textContent = `Failed to start (${res.status})`;
        btn.disabled = false;
      }
    } catch (e) {
      status.textContent = "Failed to start - see console";
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
