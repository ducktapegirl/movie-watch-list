name: Refresh Streaming Data

on:
  schedule:
    - cron: '0 4 * * *'  # daily at 4am UTC (midnight ET)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync

      - name: Generate streaming data
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          GIST_URL: ${{ vars.GIST_URL }}
        run: uv run python scripts/generate.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: refresh streaming data"
          git push
